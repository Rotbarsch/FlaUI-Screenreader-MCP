name: Release & Publish NuGet Packages

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Extract version from tag (v1.2.3 → 1.2.3)
      - name: Extract version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      # FlaUIScreenReaderMCP
      - name: Restore FlaUIScreenReaderMCP
        run: dotnet restore FlaUIScreenReaderMCP/FlaUIScreenReaderMCP.csproj

      - name: Build FlaUIScreenReaderMCP
        run: dotnet build FlaUIScreenReaderMCP/FlaUIScreenReaderMCP.csproj --configuration Release --no-restore -p:Version=${{ steps.version.outputs.VERSION }}

      - name: Pack FlaUIScreenReaderMCP
        run: dotnet pack FlaUIScreenReaderMCP/FlaUIScreenReaderMCP.csproj --configuration Release --no-build -p:ContinuousIntegrationBuild=true -p:Version=${{ steps.version.outputs.VERSION }}

      - name: Publish to NuGet
        run: dotnet nuget push "FlaUIScreenReaderMCP/**/*.nupkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
